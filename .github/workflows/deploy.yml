name: Build, Push to ECR, Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: resume-coach

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run eval harness (mock mode)
        env:
          LLM_PROVIDER: replicate
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          REPLICATE_MODEL: meta/meta-llama-3-8b-instruct
          REPLICATE_MODEL_VERSION: ""
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ML_ENABLED: "true"
          LANGFUSE_ENABLED: "false"
          API_KEY: ci-key
          DEBUG: "false"
        run: |
          python -m eval.harness --mock

      - name: Upload score reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-scores
          path: eval/scores/

  build-and-push:
    runs-on: ubuntu-latest
    needs: eval
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 300s
          script: |
            cd /home/ubuntu/resume-coach

            # Pull latest code
            git pull origin main

            # Login to ECR
            aws ecr get-login-password --region us-east-1 | \
              sudo docker login --username AWS --password-stdin \
              ${{ secrets.ECR_REGISTRY }}

            # Pull latest image
            sudo docker pull ${{ secrets.ECR_REGISTRY }}/resume-coach:latest

            # Restart with new image
            sudo docker compose down
            sudo docker compose up -d

            # Verify
            sleep 10
            curl -f http://localhost/health && echo "✅ Deploy successful" || echo "❌ Health check failed"
